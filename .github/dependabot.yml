# See GitHub's documentation for more information on this file:
# https://docs.github.com/en/code-security/supply-chain-security/keeping-your-dependencies-updated-automatically/configuration-options-for-dependency-updates
version: 2
updates:
  # Maintain dependencies for Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "14:00"
      timezone: "Europe/Vilnius"
    # Wait at least 7 days after a release is published before opening an
    # update PR, to mitigate supply-chain attacks via newly published versions.
    cooldown:
      default-days: 7
    groups:
      # Group all terraform-plugin-(go|sdk|framework|testing) dependencies together
      "terraform-plugin":
        patterns:
          - "github.com/hashicorp/terraform-plugin-*"
  - package-ecosystem: "gomod"
    directory: "/tools"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "16:00"
      timezone: "Europe/Vilnius"
    cooldown:
      default-days: 7
  - package-ecosystem: "github-actions"
    directory: "/"
    groups:
      "github-actions":
        patterns:
          - "*" # Group all GitHub Actions dependencies together
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "13:00"
      timezone: "Europe/Vilnius"
    cooldown:
      default-days: 7
