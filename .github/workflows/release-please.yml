# Release Please workflow.
# Automatically creates a release PR from conventional commits.
# When the release PR is merged, it creates a version tag which
# triggers the Release workflow (release.yml) to run GoReleaser.
name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
