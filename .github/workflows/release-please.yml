# Release Please workflow.
# Automatically creates a release PR from conventional commits.
# When the release PR is merged, it creates a version tag which
# triggers the Release workflow (release.yml) to run GoReleaser.
name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
