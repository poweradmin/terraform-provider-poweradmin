# Release Please workflow.
# Automatically creates a release PR from conventional commits.
# When the release PR is merged, it creates a version tag which
# triggers the Release workflow (release.yml) to run GoReleaser.
name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
